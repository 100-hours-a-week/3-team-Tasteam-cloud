# Caddy EC2 docker-compose
# 배포: 수동 scp 후 이 디렉토리에서 `cp .env.example .env` → 값 수정 → `docker compose up -d --build`
# Compose는 .env를 자동 로드하고, Caddy는 sites/${ENVIRONMENT}.caddy 를 import한다.

services:
  caddy:
    build: .
    container_name: caddy
    restart: unless-stopped
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      - CADDY_ADMIN=${CADDY_ADMIN:-0.0.0.0:2019}
      - SPRING_UPSTREAM=${SPRING_UPSTREAM}
      - STATIC_ROOT=${STATIC_ROOT:-/var/www/html/current}
      - SWAGGER_ADMIN_HASH=${SWAGGER_ADMIN_HASH}
      - ENCODE_PROFILE=${ENCODE_PROFILE:-gzip_zstd}
      - ACCESS_LOG_PROFILE=${ACCESS_LOG_PROFILE:-on}
      - RATE_LIMIT_PROFILE=${RATE_LIMIT_PROFILE:-on}
      - UPSTREAM_MAX_CONNS=${UPSTREAM_MAX_CONNS:-200}
      - UPSTREAM_WS_MAX_CONNS=${UPSTREAM_WS_MAX_CONNS:-1000}
      - UPSTREAM_DIAL_TIMEOUT=${UPSTREAM_DIAL_TIMEOUT:-3s}
      - UPSTREAM_RESPONSE_HEADER_TIMEOUT=${UPSTREAM_RESPONSE_HEADER_TIMEOUT:-10s}
      - UPSTREAM_READ_TIMEOUT=${UPSTREAM_READ_TIMEOUT:-30s}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./snippets:/etc/caddy/snippets:ro
      - ./sites:/etc/caddy/sites:ro
      - /opt/caddy/www/html:/var/www/html:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    ports:
      - "12345:12345"  # Alloy 자체 텔레메트리 + 메트릭 (Prometheus가 pull)
    volumes:
      - ./alloy/alloy-caddy.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock  # cAdvisor + Docker 로그 수집용
    environment:
      - LOKI_HOST=${LOKI_HOST}
      - PROMETHEUS_HOST=${PROMETHEUS_HOST}          # Caddy 메트릭 remote_write용
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      - ROLE=caddy
      - HOSTNAME=${HOSTNAME}
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy

volumes:
  caddy_data:
  caddy_config:

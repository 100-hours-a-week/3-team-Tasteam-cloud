global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

# 대부분의 메트릭은 각 EC2의 Alloy가 prometheus.remote_write로 직접 push
# - Spring Actuator: alloy-app.alloy의 prometheus.scrape "spring"
# - node_exporter / cAdvisor / Redis: alloy-*.alloy의 prometheus.scrape "infra"
# Kafka 메트릭은 Alloy 미설치 인스턴스이므로 Prometheus가 직접 scrape

scrape_configs:
  - job_name: kafka-broker-jmx-stg
    static_configs:
      - targets: ['10.12.143.218:7071']
    relabel_configs:
      - target_label: environment
        replacement: stg
      - target_label: instance
        replacement: ip-10-12-143-218
      - target_label: role
        replacement: kafka

  - job_name: kafka-connect-jmx-stg
    static_configs:
      - targets: ['10.12.158.154:7072']
    relabel_configs:
      - target_label: environment
        replacement: stg
      - target_label: instance
        replacement: ip-10-12-158-154
      - target_label: role
        replacement: kafka

  - job_name: kafka-exporter-stg
    static_configs:
      - targets: ['10.12.143.218:9308']
    relabel_configs:
      - target_label: environment
        replacement: stg
      - target_label: instance
        replacement: ip-10-12-143-218
      - target_label: role
        replacement: kafka

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app-prod

resources:
  - ../../base

patches:
  # Spring Boot — prod 이미지 태그 (CI가 이 파일의 newTag를 업데이트)
  - target:
      kind: Deployment
      name: spring-boot
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  # BE 파이프라인 검증 후 활성화
  # # FastAPI — prod 이미지 태그
  # - target:
  #     kind: Deployment
  #     name: fastapi
  #   patch: |-
  #     - op: replace
  #       path: /spec/replicas
  #       value: 1

  # Ingress host — prod 도메인
  - target:
      kind: Ingress
      name: tasteam-api-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api.tasteam.kr

  - target:
      kind: Ingress
      name: tasteam-ws-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api.tasteam.kr

images:
  - name: SPRING_BOOT_IMAGE
    newName: 203802643061.dkr.ecr.ap-northeast-2.amazonaws.com/tasteam-be
    newTag: 512710f
  # BE 파이프라인 검증 후 활성화
  # - name: FASTAPI_IMAGE
  #   newName: 203802643061.dkr.ecr.ap-northeast-2.amazonaws.com/tasteam-ai
  #   newTag: latest  # CI에서 git SHA로 교체

configMapGenerator:
  - name: spring-config
    behavior: replace
    literals:
      - profile=prod
  # BE 파이프라인 검증 후 활성화
  # - name: fastapi-config
  #   behavior: replace
  #   literals:
  #     - env=prod

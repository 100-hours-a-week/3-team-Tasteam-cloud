apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot
  labels:
    app: spring-boot
    part-of: tasteam
spec:
  replicas: 2
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: spring-boot
  template:
    metadata:
      annotations:
        config.linkerd.io/skip-outbound-ips: "169.254.169.254"
      labels:
        app: spring-boot
        part-of: tasteam
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: spring-boot
          image: SPRING_BOOT_IMAGE  # CI에서 kustomize edit set image로 교체
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 15
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: spring-boot-runtime
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: spring-config
                  key: profile
            - name: SERVER_PORT
              value: "8080"

# Grafana Alloy — 카오스 관측용 최소 메트릭 수집 에이전트
# chart: grafana/alloy
# 역할: cadvisor(컨테이너) + kube-state-metrics scrape → shared Prometheus(prom-dev) remote_write push
# 기존 EC2 Alloy push 모델을 K8s로 확장 (k8s-monitoring-integration.md 참조)

controller:
  # 노드별 1개 — 클러스터링으로 scrape 타겟을 pod 간 분산(중복 제거)
  type: daemonset

alloy:
  clustering:
    enabled: true

  # remote_write basic_auth + 노드명 주입
  extraEnv:
    - name: PROM_RW_USERNAME
      valueFrom:
        secretKeyRef:
          name: prom-remote-write-auth
          key: username
    - name: PROM_RW_PASSWORD
      valueFrom:
        secretKeyRef:
          name: prom-remote-write-auth
          key: password
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName

  configMap:
    content: |-
      // ── 노드 디스커버리 (kubelet cadvisor 타겟) ──
      discovery.kubernetes "nodes" {
        role = "node"
      }

      // 각 노드의 kubelet cadvisor 엔드포인트로 주소 재작성 (apiserver proxy 경유)
      discovery.relabel "cadvisor" {
        targets = discovery.kubernetes.nodes.targets
        rule {
          target_label = "__address__"
          replacement  = "kubernetes.default.svc.cluster.local:443"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          regex         = "(.+)"
          target_label  = "__metrics_path__"
          replacement   = "/api/v1/nodes/${1}/proxy/metrics/cadvisor"
        }
      }

      // ── 컨테이너 메트릭 (container_cpu/memory) — FI-08 CPU, OOMKill ──
      prometheus.scrape "cadvisor" {
        targets           = discovery.relabel.cadvisor.output
        scheme            = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = true
        }
        scrape_interval = "15s"
        clustering { enabled = true }
        forward_to = [prometheus.relabel.k8s.receiver]
      }

      // ── kube-state-metrics (HPA replica / Pod / PDB) — FI-06, FI-08 ──
      prometheus.scrape "ksm" {
        targets = [{
          __address__ = "kube-state-metrics.monitoring.svc.cluster.local:8080",
          job         = "kube-state-metrics",
        }]
        scrape_interval = "15s"
        clustering { enabled = true }
        forward_to = [prometheus.relabel.k8s.receiver]
      }

      // 공통 relabel (필요 시 불필요 메트릭 drop 지점)
      prometheus.relabel "k8s" {
        forward_to = [prometheus.remote_write.default.receiver]
      }

      // ── shared Prometheus(prom-dev)로 push — HTTPS + basic_auth ──
      prometheus.remote_write "default" {
        endpoint {
          url = "https://prom-dev.tasteam.kr/api/v1/write"
          basic_auth {
            username = sys.env("PROM_RW_USERNAME")
            password = sys.env("PROM_RW_PASSWORD")
          }
        }
        // 라벨링 컨벤션 계승: environment / role / instance
        external_labels = {
          environment = "prod",
          role        = "k8s",
          instance    = sys.env("NODE_NAME"),
        }
      }

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

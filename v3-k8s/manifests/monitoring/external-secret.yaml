apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prom-remote-write-auth
  namespace: monitoring
spec:
  # shared Prometheus(prom-dev) remote_write basic_auth 자격증명
  # 원본: AWS SSM Parameter Store /prod/tasteam/monitoring/*
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: prom-remote-write-auth   # 생성될 K8s Secret 이름 (Alloy가 참조)
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: /prod/tasteam/monitoring/prom-rw-username
    - secretKey: password
      remoteRef:
        key: /prod/tasteam/monitoring/prom-rw-password

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-resources
  namespace: argocd
  labels:
    project: tasteam
    component: monitoring
  # 가장 먼저 동기화 — ns / ExternalSecret / RBAC (helm 컴포넌트의 선행 조건)
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tasteam-monitoring

  source:
    repoURL: https://github.com/100-hours-a-week/3-team-Tasteam-cloud.git
    targetRevision: main
    path: v3-k8s/manifests/monitoring
    directory:
      recurse: false
      include: "*.yaml"      # README.md 등 비-yaml 제외

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  labels:
    project: tasteam
    component: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # KSM + ExternalSecret(자격증명) 이후
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tasteam-monitoring

  # multi-source: helm chart(외부 repo) + 이 repo의 values(config.alloy 포함)
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.0.3
      helm:
        valueFiles:
          - $values/v3-k8s/manifests/helm/values/alloy.yaml
    - repoURL: https://github.com/100-hours-a-week/3-team-Tasteam-cloud.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
